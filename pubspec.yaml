name: snackly
description: "Snackly - A smart grocery store mobile app with ML-powered demand prediction and dynamic pricing."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  provider: ^6.1.2
  
  # Navigation
  go_router: ^16.2.5
  
  # UI Components
  cupertino_icons: ^1.0.8
  material_design_icons_flutter: ^7.0.7296
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.4.1
  flutter_cache_manager: ^3.4.1
  shimmer: ^3.0.0
  
  # Maps and Location
  google_maps_flutter: ^2.5.0
  
  # Networking
  dio: ^5.7.0
  connectivity_plus: ^7.0.0
  
  # Firebase Services - Core only for now
  firebase_core: ^4.2.0
  cloud_firestore: ^6.0.3
  
  # Local Storage
  shared_preferences: ^2.3.2
  sqflite: ^2.4.0
  path: ^1.9.0
  
  # Authentication & Security
  crypto: ^3.0.5
  jwt_decoder: ^2.0.1
  
  # Location Services
  geolocator: ^10.1.0
  permission_handler: ^12.0.1
  
  # Payment Integration
  # razorpay_flutter: ^1.3.7  # Temporarily disabled due to build issues
  
  # QR Code Handling
  # qr_code_scanner: ^1.0.1  # Temporarily disabled due to Android build issues
  qr_flutter: ^4.1.0
  
  # Image Processing
  image_picker: ^1.1.2
  image: ^4.2.0
  
  # Charts and Visualization
  # fl_chart: ^1.1.1  # Temporarily disabled due to Flutter SDK compatibility
  
  # Date/Time Utilities
  intl: ^0.20.2
  
  # Device Info
  device_info_plus: ^12.2.0
  
  # File Handling
  path_provider: ^2.1.4
  
  # ML Integration - Commented out to support older Android versions (API 21+)
  # tflite_flutter: ^0.11.0  # Requires minSdk 26, can be re-enabled if needed
  
  # JSON Handling
  json_annotation: ^4.9.0
  
  # Utils
  uuid: ^4.5.1
  logger: ^2.4.0
  supabase_flutter: ^2.10.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  json_serializable: ^6.8.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/images/snackly_logo.png
    - assets/images/app_logo.png
    - assets/images/products/
    - assets/ml_models/
    - assets/icons/
